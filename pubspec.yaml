version: 1.0.0

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  google_generative_ai: ^0.4.6
  shared_preferences: ^2.2.3
  fl_chart: ^0.69.0
  url_launcher: ^6.2.6
